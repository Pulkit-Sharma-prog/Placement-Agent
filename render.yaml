services:
  - type: web
    name: placements-agent-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r ../requirements.txt
      for i in 1 2 3; do
        python -m spacy download en_core_web_sm && break
        echo "spacy download attempt $i failed, retrying in 10s..." && sleep 10
      done || echo "spacy model download failed after 3 attempts — resume parser will fall back to regex-only name extraction"
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./placements.db
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Optional: comma-separated override for CORS allow-list.
      # If unset, backend falls back to localhost dev URLs + FRONTEND_URL.
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: false
    disk:
      name: placements-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
